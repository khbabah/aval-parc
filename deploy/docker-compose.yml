# Aval Parc — production (serveur local clinique)
# Démarrage : docker compose --env-file .env up -d

volumes:
  db_data:
  storage:

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: aval-parc:${AVAL_VERSION:-v1}
    restart: unless-stopped
    volumes:
      - storage:/var/lib/snipeit
      # Archive du code source servie sur /source.tar.gz (conformité AGPL) —
      # générée par install.sh AVANT le premier `up` ; docroot Apache :
      # /var/www/html/public (docker/000-default.conf upstream).
      - ./source.tar.gz:/var/www/html/public/source.tar.gz:ro
    ports:
      - "${APP_PORT:-8000}:80"
    depends_on:
      db:
        condition: service_healthy
        restart: true
    env_file:
      # Forme courte : compatible compose < 2.24 (serveurs cliniques anciens).
      # export-images.sh crée un .env depuis .env.example si absent.
      - .env

  db:
    image: mariadb:11.4.7
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s
